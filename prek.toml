# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

minimum_prek_version = "0.3.8"

[[repos]]
repo = "builtin"
hooks = [
    { id = "check-merge-conflict" },
    { id = "detect-private-key" },
    { id = "check-toml" },
    { id = "check-yaml" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "fmt-check"
name = "cargo fmt --check"
language = "system"
entry = "cargo fmt --check"
always_run = true
pass_filenames = false
priority = 10

[[repos.hooks]]
id = "validate-grammar-registry"
name = "validate grammar registry"
language = "system"
entry = "cargo run --quiet --locked --bin validate-grammar-registry"
always_run = true
pass_filenames = false
priority = 15

[[repos.hooks]]
id = "clippy"
name = "cargo clippy"
language = "system"
entry = "cargo clippy --locked --all-targets --all-features -- -D warnings"
always_run = true
pass_filenames = false
priority = 20

[[repos.hooks]]
id = "test"
name = "cargo nextest run"
language = "system"
entry = "cargo nextest run --config-file .config/nextest.toml --cargo-quiet --failure-output final --no-tests pass"
always_run = true
pass_filenames = false
priority = 30
