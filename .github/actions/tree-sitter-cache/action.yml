name: "Tree-sitter Cache"
description: "Manage the shared tree-sitter build cache with per-grammar hashing"
author: "happy-proto"
inputs:
  mode:
    description: "Either restore or save"
    required: true
  key-prefix:
    description: "Stable cache key prefix, usually scoped by runner OS and target triple"
    required: true
  target:
    description: "Rust target triple"
    required: true
  profile:
    description: "Cargo profile name"
    required: false
    default: "release"
  cache-root:
    description: "Shared tree-sitter cache root"
    required: false
    default: ".build-cache/tree-sitter-cache"
  registry-path:
    description: "Path to grammars/registry.toml"
    required: false
    default: "grammars/registry.toml"
runs:
  using: "composite"
  steps:
    - name: Prepare tree-sitter cache state
      id: prepare
      shell: bash
      run: node "${{ github.action_path }}/setup.cjs"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_KEY_PREFIX: ${{ inputs.key-prefix }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CACHE_ROOT: ${{ inputs.cache-root }}
        INPUT_REGISTRY_PATH: ${{ inputs.registry-path }}

    - name: Restore tree-sitter build cache
      if: inputs.mode == 'restore'
      id: cache-restore
      uses: actions/cache/restore@v5
      with:
        path: ${{ inputs.cache-root }}
        key: ${{ steps.prepare.outputs.cache-key }}
        restore-keys: |
          ${{ steps.prepare.outputs.restore-prefix }}

    - name: Reconcile tree-sitter cache contents
      if: inputs.mode == 'restore'
      shell: bash
      run: node "${{ github.action_path }}/reconcile.cjs"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CACHE_ROOT: ${{ inputs.cache-root }}

    - name: Finalize tree-sitter cache contents
      if: inputs.mode == 'save'
      shell: bash
      run: node "${{ github.action_path }}/finalize.cjs"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_CACHE_ROOT: ${{ inputs.cache-root }}

    - name: Save tree-sitter build cache
      if: inputs.mode == 'save'
      uses: actions/cache/save@v5
      with:
        path: ${{ inputs.cache-root }}
        key: ${{ steps.prepare.outputs.cache-key }}
