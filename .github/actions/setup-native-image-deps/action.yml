name: Set up native image dependencies
description: Install native libraries required by image codec features.

inputs:
  target:
    description: Rust target triple, used to select the Windows vcpkg triplet.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install dav1d on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libdav1d-dev pkg-config

    - name: Install dav1d on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        brew install dav1d pkg-config

    - name: Install dav1d on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        TARGET: ${{ inputs.target }}
      run: |
        choco install pkgconfiglite -y --no-progress

        if ($env:TARGET -eq "aarch64-pc-windows-msvc") {
          $triplet = "arm64-windows"
        } else {
          $triplet = "x64-windows"
        }

        vcpkg install "dav1d:$triplet"

        $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
        if (-not $vcpkgRoot) {
          $vcpkgRoot = "C:\vcpkg"
        }

        "PKG_CONFIG_PATH=$vcpkgRoot\installed\$triplet\lib\pkgconfig" >> $env:GITHUB_ENV
