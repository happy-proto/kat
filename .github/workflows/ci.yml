name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TREE_SITTER_CACHE_KEY_PREFIX: tree-sitter-cache-v1

jobs:
  fmt:
    name: fmt (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run rustfmt check
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check

  clippy:
    name: clippy (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Cargo registry cache
        id: cargo-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Validate grammar registry layout
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet --locked --bin validate-grammar-registry

      - name: Set up sccache
        uses: ./.github/actions/sccache

      - name: Restore tree-sitter build cache
        id: tree-sitter-cache
        uses: ./.github/actions/tree-sitter-cache
        with:
          mode: restore
          key-prefix: ${{ env.TREE_SITTER_CACHE_KEY_PREFIX }}-${{ runner.os }}-${{ runner.arch }}-x86_64-unknown-linux-gnu-${{ hashFiles('build.rs') }}
          target: x86_64-unknown-linux-gnu
          profile: debug
          enabled: ${{ github.ref_name != 'master' }}

      - name: Run clippy
        shell: bash
        run: |
          set -euo pipefail
          "${SCCACHE_PATH}" --zero-stats
          cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Save Cargo registry cache
        if: always() && (github.ref_name == 'master' || steps.cargo-cache.outputs.cache-hit != 'true')
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

      - name: Save tree-sitter build cache
        if: always() && (github.ref_name == 'master' || steps.tree-sitter-cache.outputs.cache-hit != 'true')
        uses: ./.github/actions/tree-sitter-cache
        with:
          mode: save
          key-prefix: ${{ env.TREE_SITTER_CACHE_KEY_PREFIX }}-${{ runner.os }}-${{ runner.arch }}-x86_64-unknown-linux-gnu-${{ hashFiles('build.rs') }}
          target: x86_64-unknown-linux-gnu
          profile: debug

  test:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Cargo registry cache
        id: cargo-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate grammar registry layout
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet --locked --bin validate-grammar-registry

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Set up sccache
        uses: ./.github/actions/sccache

      - name: Restore tree-sitter build cache
        id: tree-sitter-cache
        uses: ./.github/actions/tree-sitter-cache
        with:
          mode: restore
          key-prefix: ${{ env.TREE_SITTER_CACHE_KEY_PREFIX }}-${{ runner.os }}-${{ runner.arch }}-x86_64-unknown-linux-gnu-${{ hashFiles('build.rs') }}
          target: x86_64-unknown-linux-gnu
          profile: debug
          enabled: ${{ github.ref_name != 'master' }}

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          "${SCCACHE_PATH}" --zero-stats
          cargo nextest run \
            --config-file .config/nextest.toml \
            --cargo-quiet \
            --failure-output final \
            --no-tests pass

      - name: Save Cargo registry cache
        if: always() && (github.ref_name == 'master' || steps.cargo-cache.outputs.cache-hit != 'true')
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

      - name: Save tree-sitter build cache
        if: always() && (github.ref_name == 'master' || steps.tree-sitter-cache.outputs.cache-hit != 'true')
        uses: ./.github/actions/tree-sitter-cache
        with:
          mode: save
          key-prefix: ${{ env.TREE_SITTER_CACHE_KEY_PREFIX }}-${{ runner.os }}-${{ runner.arch }}-x86_64-unknown-linux-gnu-${{ hashFiles('build.rs') }}
          target: x86_64-unknown-linux-gnu
          profile: debug

  build:
    name: >-
      build (${{ matrix.runner }} / ${{ matrix.target }})
    if: github.ref == 'refs/heads/master'
    needs:
      - fmt
      - clippy
      - test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            linker: cc
            archive_ext: tgz
            binary_ext: ""
            use_link_wrapper: true
            use_sccache: true
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            linker: cc
            archive_ext: tgz
            binary_ext: ""
            use_link_wrapper: true
            use_sccache: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            linker: cc
            archive_ext: tgz
            binary_ext: ""
            use_link_wrapper: true
            use_sccache: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: ".exe"
            use_link_wrapper: false
            use_sccache: false
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            binary_ext: ".exe"
            use_link_wrapper: false
            use_sccache: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Cargo registry cache
        id: cargo-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Validate grammar registry layout
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet --locked --bin validate-grammar-registry

      - name: Set up sccache
        if: matrix.use_sccache
        uses: ./.github/actions/sccache

      - name: Restore tree-sitter build cache
        id: tree-sitter-cache
        uses: ./.github/actions/tree-sitter-cache
        with:
          mode: restore
          key-prefix: ${{ env.TREE_SITTER_CACHE_KEY_PREFIX }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('build.rs') }}
          target: ${{ matrix.target }}
          profile: release
          enabled: ${{ github.ref_name != 'master' }}

      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          KAT_LINK_LOG: ${{ runner.temp }}/rust-link-timings.tsv
          KAT_BUILD_PROFILE: "1"
          KAT_BUILD_PROFILE_LOG: ${{ runner.temp }}/tree-sitter-build-profile.log
          BINARY_EXT: ${{ matrix.binary_ext }}
          USE_LINK_WRAPPER: ${{ matrix.use_link_wrapper }}
          USE_SCCACHE: ${{ matrix.use_sccache }}
          KAT_REAL_LINKER: ${{ matrix.linker }}
        run: |
          set -euo pipefail

          total_start=$(date +%s)

          build_start=$(date +%s)
          if [[ "${USE_SCCACHE}" == "true" ]]; then
            "${SCCACHE_PATH}" --zero-stats
          fi
          : > "${KAT_LINK_LOG}"
          : > "${KAT_BUILD_PROFILE_LOG}"

          if [[ "${USE_LINK_WRAPPER}" == "true" ]]; then
            export RUSTFLAGS="-Clinker=${GITHUB_WORKSPACE}/.github/scripts/rust-link-wrapper.sh"
          fi

          cargo build --timings --release --locked --target "${TARGET}"
          build_end=$(date +%s)

          total_end=$(date +%s)

          artifact_path="target/${TARGET}/release/kat${BINARY_EXT}"

          artifact_size=$(stat -f%z "${artifact_path}" 2>/dev/null || stat -c%s "${artifact_path}")

          if [[ -s "${KAT_LINK_LOG}" ]]; then
            link_invocations=$(wc -l < "${KAT_LINK_LOG}" | tr -d ' ')
            link_total_ms=$(awk -F'\t' '{sum += $2} END {printf "%.0f", sum}' "${KAT_LINK_LOG}")
            longest_link_record=$(awk -F'\t' 'BEGIN { max = -1 } { if (($2 + 0) > max) { max = $2; status = $3; output = $4 } } END { if (max < 0) { print "0\tunknown\t(unknown)" } else { print max "\t" status "\t" output } }' "${KAT_LINK_LOG}")
            IFS=$'\t' read -r longest_link_ms longest_link_status longest_link_output <<< "${longest_link_record}"
          else
            link_invocations=0
            link_total_ms=0
            longest_link_ms=0
            longest_link_status=unknown
            longest_link_output="(unknown)"
          fi

          {
            echo "BUILD_SECONDS=$((build_end - build_start))"
            echo "TOTAL_SECONDS=$((total_end - total_start))"
            echo "ARTIFACT_PATH=${artifact_path}"
            echo "ARTIFACT_SIZE=${artifact_size}"
            echo "LINK_INVOCATIONS=${link_invocations}"
            echo "LINK_TOTAL_MS=${link_total_ms}"
            echo "LONGEST_LINK_MS=${longest_link_ms}"
            echo "LONGEST_LINK_STATUS=${longest_link_status}"
            echo "LONGEST_LINK_OUTPUT=${longest_link_output}"
            echo "LINK_LOG_PATH=${KAT_LINK_LOG}"
            echo "TREE_SITTER_BUILD_PROFILE_PATH=${KAT_BUILD_PROFILE_LOG}"
          } >> "${GITHUB_ENV}"

      - name: Package latest release asset (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          set -euo pipefail

          package_dir="${RUNNER_TEMP}/kat-${TARGET}"
          archive_path="${RUNNER_TEMP}/kat-${TARGET}.${ARCHIVE_EXT}"

          rm -rf "${package_dir}" "${archive_path}"
          mkdir -p "${package_dir}"
          cp "${ARTIFACT_PATH}" "${package_dir}/kat${BINARY_EXT}"
          tar -C "${RUNNER_TEMP}" -czf "${archive_path}" "kat-${TARGET}"

          echo "PACKAGE_PATH=${archive_path}" >> "${GITHUB_ENV}"

      - name: Package latest release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $packageDir = Join-Path $env:RUNNER_TEMP "kat-$env:TARGET"
          $archivePath = Join-Path $env:RUNNER_TEMP "kat-$env:TARGET.zip"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item $env:ARTIFACT_PATH (Join-Path $packageDir "kat.exe")
          Compress-Archive -Path $packageDir -DestinationPath $archivePath

          "PACKAGE_PATH=$archivePath" >> $env:GITHUB_ENV

      - name: Save Cargo registry cache
        if: always() && (github.ref_name == 'master' || steps.cargo-cache.outputs.cache-hit != 'true')
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: ${{ steps.cargo-cache.outputs.cache-primary-key }}

      - name: Save tree-sitter build cache
        if: always() && (github.ref_name == 'master' || steps.tree-sitter-cache.outputs.cache-hit != 'true')
        uses: ./.github/actions/tree-sitter-cache
        with:
          mode: save
          key-prefix: ${{ env.TREE_SITTER_CACHE_KEY_PREFIX }}-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-${{ hashFiles('build.rs') }}
          target: ${{ matrix.target }}
          profile: release

      - name: Publish job summary
        shell: bash
        run: |
          {
            echo "## Build summary"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Target: \`${{ matrix.target }}\`"
            echo "- cargo build --release --locked: \`${BUILD_SECONDS}s\`"
            echo "- Total: \`${TOTAL_SECONDS}s\`"
            echo "- Binary: \`${ARTIFACT_PATH}\`"
            echo "- Size: \`${ARTIFACT_SIZE} bytes\`"
            echo "- Link invocations: \`${LINK_INVOCATIONS}\`"
            echo "- Total linker wall time: \`${LINK_TOTAL_MS} ms\`"
            echo "- Longest linker invocation: \`${LONGEST_LINK_MS} ms\`"
            echo "- Longest linker status: \`${LONGEST_LINK_STATUS}\`"
            echo "- Longest linker output: \`${LONGEST_LINK_OUTPUT}\`"
            echo "- Cargo timings: \`target/cargo-timings/cargo-timing.html\`"
            echo "- Tree-sitter build profile: \`${TREE_SITTER_BUILD_PROFILE_PATH}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: kat-release-package-${{ matrix.target }}
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

      - name: Upload build observability artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kat-build-observability-${{ matrix.target }}
          path: |
            target/cargo-timings/
            ${{ env.LINK_LOG_PATH }}
            ${{ env.TREE_SITTER_BUILD_PROFILE_PATH }}
          if-no-files-found: error

  release-latest:
    name: release latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download latest release packages
        uses: actions/download-artifact@v5
        with:
          pattern: kat-release-package-*
          path: ${{ runner.temp }}/latest-release-assets
          merge-multiple: true

      - name: Move latest tag to current commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin
          git tag -f latest "${GITHUB_SHA}"
          git push --force origin refs/tags/latest

      - name: Publish latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_DIR: ${{ runner.temp }}/latest-release-assets
        run: |
          set -euo pipefail

          notes_file="${RUNNER_TEMP}/latest-release-notes.md"

          cat > "${notes_file}" <<EOF
          latest channel for the current master tip.

          - Branch: \`master\`
          - Commit: \`${GITHUB_SHA}\`
          - Commit URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          EOF

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "latest" \
              --notes-file "${notes_file}" \
              --prerelease
          else
            gh release create latest \
              --title "latest" \
              --notes-file "${notes_file}" \
              --prerelease \
              --latest=false \
              --target "${GITHUB_SHA}"
          fi

          gh release upload latest "${RELEASE_ASSET_DIR}"/* --clobber
