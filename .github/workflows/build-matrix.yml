name: Build Matrix

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  CC: sccache cc
  CXX: sccache c++

jobs:
  build:
    name: >-
      build (${{ matrix.runner }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sccache_archive: sccache-v0.14.0-x86_64-unknown-linux-musl.tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            sccache_archive: sccache-v0.14.0-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js with pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install sccache
        shell: bash
        env:
          SCCACHE_ARCHIVE: ${{ matrix.sccache_archive }}
        run: |
          set -euo pipefail

          base_url="https://github.com/mozilla/sccache/releases/download/v0.14.0"
          archive_path="${RUNNER_TEMP}/${SCCACHE_ARCHIVE}"
          extract_dir="${RUNNER_TEMP}/sccache-extract"
          curl --fail --location --silent --show-error \
            "${base_url}/${SCCACHE_ARCHIVE}" \
            --output "${archive_path}"
          rm -rf "${extract_dir}"
          mkdir -p "${extract_dir}"
          tar -xzf "${archive_path}" -C "${extract_dir}"
          rm -f "${RUNNER_TEMP}/sccache"
          install "${extract_dir}"/sccache-*/sccache "${RUNNER_TEMP}/sccache"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          echo "SCCACHE_PATH=${RUNNER_TEMP}/sccache" >> "${GITHUB_ENV}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo registry cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-targets: false

      - name: Install dependencies and build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          total_start=$(date +%s)

          install_start=$(date +%s)
          pnpm install --frozen-lockfile
          install_end=$(date +%s)

          build_start=$(date +%s)
          "${SCCACHE_PATH}" --zero-stats
          cargo build --release --locked --target "${TARGET}"
          build_end=$(date +%s)

          total_end=$(date +%s)

          artifact_path="target/${TARGET}/release/kat"

          artifact_size=$(stat -f%z "${artifact_path}" 2>/dev/null || stat -c%s "${artifact_path}")

          {
            echo "INSTALL_SECONDS=$((install_end - install_start))"
            echo "BUILD_SECONDS=$((build_end - build_start))"
            echo "TOTAL_SECONDS=$((total_end - total_start))"
            echo "ARTIFACT_PATH=${artifact_path}"
            echo "ARTIFACT_SIZE=${artifact_size}"
          } >> "${GITHUB_ENV}"

      - name: Collect sccache stats
        shell: bash
        run: |
          set -euo pipefail

          stats_path="${RUNNER_TEMP}/sccache-stats.txt"
          stats_json_path="${RUNNER_TEMP}/sccache-stats.json"
          "${SCCACHE_PATH}" --show-stats | tee "${stats_path}"
          "${SCCACHE_PATH}" --show-stats --stats-format=json > "${stats_json_path}"

          requests_executed=$(jq -r '.stats.requests_executed' "${stats_json_path}")
          cache_hits=$(jq -r '(.stats.cache_hits.counts | to_entries | map(.value) | add) // 0' "${stats_json_path}")
          cache_misses=$(jq -r '(.stats.cache_misses.counts | to_entries | map(.value) | add) // 0' "${stats_json_path}")
          non_cacheable=$(jq -r '.stats.non_cacheable_compilations' "${stats_json_path}")
          cache_timeouts=$(jq -r '.stats.cache_timeouts' "${stats_json_path}")

          if (( requests_executed > 0 )); then
            hit_rate=$(awk -v hits="${cache_hits}" -v requests="${requests_executed}" 'BEGIN { printf "%.2f %%", (hits / requests) * 100 }')
          else
            hit_rate="0.00 %"
          fi

          sccache_status="Warm cache activity detected."
          if [[ "${requests_executed}" == "0" ]]; then
            sccache_status="No compile requests reached sccache; verify wrapper configuration."
          elif [[ "${cache_hits}" == "0" && "${cache_misses}" != "0" ]]; then
            sccache_status="Cold cache run; requests reached sccache, but no hits were restored."
          elif [[ "${cache_hits}" == "0" && "${cache_misses}" == "0" ]]; then
            sccache_status="No cacheable compilations were reported; verify workload shape and compiler wrapping."
          elif [[ "${cache_timeouts}" != "0" && "${cache_timeouts}" != "unknown" ]]; then
            sccache_status="Cache activity detected, but timeouts occurred; inspect backend latency."
          fi

          {
            echo "SCCACHE_REQUESTS=${requests_executed}"
            echo "SCCACHE_HITS=${cache_hits}"
            echo "SCCACHE_MISSES=${cache_misses}"
            echo "SCCACHE_HIT_RATE=${hit_rate}"
            echo "SCCACHE_NON_CACHEABLE=${non_cacheable}"
            echo "SCCACHE_TIMEOUTS=${cache_timeouts}"
            echo "SCCACHE_STATUS=${sccache_status}"
            echo 'SCCACHE_STATS<<EOF'
            cat "${stats_path}"
            echo 'EOF'
          } >> "${GITHUB_ENV}"

      - name: Publish job summary
        shell: bash
        run: |
          {
            echo "## Build summary"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Target: \`${{ matrix.target }}\`"
            echo "- pnpm install: \`${INSTALL_SECONDS}s\`"
            echo "- cargo build --release --locked: \`${BUILD_SECONDS}s\`"
            echo "- Total: \`${TOTAL_SECONDS}s\`"
            echo "- Binary: \`${ARTIFACT_PATH}\`"
            echo "- Size: \`${ARTIFACT_SIZE} bytes\`"
            echo
            echo "### sccache"
            echo
            echo "- Status: ${SCCACHE_STATUS}"
            echo "- Compile requests: \`${SCCACHE_REQUESTS}\`"
            echo "- Cache hits: \`${SCCACHE_HITS}\`"
            echo "- Cache misses: \`${SCCACHE_MISSES}\`"
            echo "- Hit rate: \`${SCCACHE_HIT_RATE}\`"
            echo "- Non-cacheable compilations: \`${SCCACHE_NON_CACHEABLE}\`"
            echo "- Cache timeouts: \`${SCCACHE_TIMEOUTS}\`"
            echo
            echo "<details><summary>Raw stats</summary>"
            echo
            echo '```text'
            printf '%s\n' "${SCCACHE_STATS}"
            echo '```'
            echo
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: kat-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
