name: Build Matrix

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  CC: sccache cc
  CXX: sccache c++

jobs:
  build:
    name: >-
      build (${{ matrix.runner }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tier: baseline
          - runner: macos-latest
            target: aarch64-apple-darwin
            tier: baseline

    steps:
      - name: Skip extended targets on pull requests
        if: github.event_name == 'pull_request' && matrix.tier != 'baseline'
        run: |
          echo "Skipping extended target ${TARGET} for pull_request."
        env:
          TARGET: ${{ matrix.target }}

      - name: Checkout repository
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: actions/checkout@v6

      - name: Set up pnpm
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up sccache
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set up Rust
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-targets: false

      - name: Measure install and build times
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          total_start=$(date +%s)

          install_start=$(date +%s)
          pnpm install --frozen-lockfile
          install_end=$(date +%s)

          build_start=$(date +%s)
          "${SCCACHE_PATH}" --zero-stats
          cargo build --release --locked --target "${TARGET}"
          build_end=$(date +%s)

          total_end=$(date +%s)

          artifact_path="target/${TARGET}/release/kat"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            artifact_path="target/${TARGET}/release/kat.exe"
          fi

          artifact_size=$(stat -f%z "${artifact_path}" 2>/dev/null || stat -c%s "${artifact_path}")

          {
            echo "INSTALL_SECONDS=$((install_end - install_start))"
            echo "BUILD_SECONDS=$((build_end - build_start))"
            echo "TOTAL_SECONDS=$((total_end - total_start))"
            echo "ARTIFACT_PATH=${artifact_path}"
            echo "ARTIFACT_SIZE=${artifact_size}"
          } >> "${GITHUB_ENV}"

      - name: Capture sccache stats
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        shell: bash
        run: |
          set -euo pipefail

          stats_path="${RUNNER_TEMP}/sccache-stats.txt"
          "${SCCACHE_PATH}" --show-stats | tee "${stats_path}"

          requests_executed=$(awk -F'  +' '/^Compile requests[[:space:]]+/ {print $2}' "${stats_path}")
          requests_executed=${requests_executed:-unknown}
          cache_hits=$(awk -F'  +' '/^Cache hits[[:space:]]+/ {print $2}' "${stats_path}")
          cache_hits=${cache_hits:-unknown}
          cache_misses=$(awk -F'  +' '/^Cache misses[[:space:]]+/ {print $2}' "${stats_path}")
          cache_misses=${cache_misses:-unknown}
          hit_rate=$(awk -F'  +' '/^Cache hits rate[[:space:]]+/ {print $2}' "${stats_path}")
          hit_rate=${hit_rate:-unknown}
          non_cacheable=$(awk -F'  +' '/^Non-cacheable compilations[[:space:]]+/ {print $2}' "${stats_path}")
          non_cacheable=${non_cacheable:-unknown}
          cache_timeouts=$(awk -F'  +' '/^Cache timeouts[[:space:]]+/ {print $2}' "${stats_path}")
          cache_timeouts=${cache_timeouts:-unknown}

          sccache_status="Warm cache activity detected."
          if [[ "${requests_executed}" == "0" ]]; then
            sccache_status="No compile requests reached sccache; verify wrapper configuration."
          elif [[ "${cache_hits}" == "0" && "${cache_misses}" != "0" ]]; then
            sccache_status="Cold cache run; requests reached sccache, but no hits were restored."
          elif [[ "${cache_hits}" == "0" && "${cache_misses}" == "0" ]]; then
            sccache_status="No cacheable compilations were reported; verify workload shape and compiler wrapping."
          elif [[ "${cache_timeouts}" != "0" && "${cache_timeouts}" != "unknown" ]]; then
            sccache_status="Cache activity detected, but timeouts occurred; inspect backend latency."
          fi

          {
            echo "SCCACHE_REQUESTS=${requests_executed}"
            echo "SCCACHE_HITS=${cache_hits}"
            echo "SCCACHE_MISSES=${cache_misses}"
            echo "SCCACHE_HIT_RATE=${hit_rate}"
            echo "SCCACHE_NON_CACHEABLE=${non_cacheable}"
            echo "SCCACHE_TIMEOUTS=${cache_timeouts}"
            echo "SCCACHE_STATUS=${sccache_status}"
            echo 'SCCACHE_STATS<<EOF'
            cat "${stats_path}"
            echo 'EOF'
          } >> "${GITHUB_ENV}"

      - name: Write job summary
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        shell: bash
        run: |
          {
            echo "## Build summary"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Target: \`${{ matrix.target }}\`"
            echo "- pnpm install: \`${INSTALL_SECONDS}s\`"
            echo "- cargo build --release --locked: \`${BUILD_SECONDS}s\`"
            echo "- Total: \`${TOTAL_SECONDS}s\`"
            echo "- Binary: \`${ARTIFACT_PATH}\`"
            echo "- Size: \`${ARTIFACT_SIZE} bytes\`"
            echo
            echo "### sccache"
            echo
            echo "- Status: ${SCCACHE_STATUS}"
            echo "- Compile requests: \`${SCCACHE_REQUESTS}\`"
            echo "- Cache hits: \`${SCCACHE_HITS}\`"
            echo "- Cache misses: \`${SCCACHE_MISSES}\`"
            echo "- Hit rate: \`${SCCACHE_HIT_RATE}\`"
            echo "- Non-cacheable compilations: \`${SCCACHE_NON_CACHEABLE}\`"
            echo "- Cache timeouts: \`${SCCACHE_TIMEOUTS}\`"
            echo
            echo "<details><summary>Raw stats</summary>"
            echo
            echo '```text'
            printf '%s\n' "${SCCACHE_STATS}"
            echo '```'
            echo
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload built binary
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: actions/upload-artifact@v6
        with:
          name: kat-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
