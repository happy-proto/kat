name: Build Matrix

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: >-
      build (${{ matrix.runner }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tier: baseline
          - runner: macos-latest
            target: aarch64-apple-darwin
            tier: baseline

    steps:
      - name: Skip extended targets on pull requests
        if: github.event_name == 'pull_request' && matrix.tier != 'baseline'
        run: |
          echo "Skipping extended target ${TARGET} for pull_request."
        env:
          TARGET: ${{ matrix.target }}

      - name: Checkout repository
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: actions/checkout@v6

      - name: Set up pnpm
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Rust
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and target directory
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Measure install and build times
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          total_start=$(date +%s)

          install_start=$(date +%s)
          pnpm install --frozen-lockfile
          install_end=$(date +%s)

          build_start=$(date +%s)
          cargo build --release --locked --target "${TARGET}"
          build_end=$(date +%s)

          total_end=$(date +%s)

          artifact_path="target/${TARGET}/release/kat"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            artifact_path="target/${TARGET}/release/kat.exe"
          fi

          artifact_size=$(stat -f%z "${artifact_path}" 2>/dev/null || stat -c%s "${artifact_path}")

          {
            echo "INSTALL_SECONDS=$((install_end - install_start))"
            echo "BUILD_SECONDS=$((build_end - build_start))"
            echo "TOTAL_SECONDS=$((total_end - total_start))"
            echo "ARTIFACT_PATH=${artifact_path}"
            echo "ARTIFACT_SIZE=${artifact_size}"
          } >> "${GITHUB_ENV}"

      - name: Write job summary
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        shell: bash
        run: |
          {
            echo "## Build summary"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Target: \`${{ matrix.target }}\`"
            echo "- pnpm install: \`${INSTALL_SECONDS}s\`"
            echo "- cargo build --release --locked: \`${BUILD_SECONDS}s\`"
            echo "- Total: \`${TOTAL_SECONDS}s\`"
            echo "- Binary: \`${ARTIFACT_PATH}\`"
            echo "- Size: \`${ARTIFACT_SIZE} bytes\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload built binary
        if: github.event_name != 'pull_request' || matrix.tier == 'baseline'
        uses: actions/upload-artifact@v6
        with:
          name: kat-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
