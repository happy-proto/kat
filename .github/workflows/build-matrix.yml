name: Build Matrix

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  CC: sccache cc
  CXX: sccache c++

jobs:
  build:
    name: >-
      build (${{ matrix.runner }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js with pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up sccache
        uses: ./.github/actions/sccache

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo registry cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-targets: false

      - name: Install dependencies and build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          total_start=$(date +%s)

          install_start=$(date +%s)
          pnpm install --frozen-lockfile
          install_end=$(date +%s)

          build_start=$(date +%s)
          "${SCCACHE_PATH}" --zero-stats
          cargo build --release --locked --target "${TARGET}"
          build_end=$(date +%s)

          total_end=$(date +%s)

          artifact_path="target/${TARGET}/release/kat"

          artifact_size=$(stat -f%z "${artifact_path}" 2>/dev/null || stat -c%s "${artifact_path}")

          {
            echo "INSTALL_SECONDS=$((install_end - install_start))"
            echo "BUILD_SECONDS=$((build_end - build_start))"
            echo "TOTAL_SECONDS=$((total_end - total_start))"
            echo "ARTIFACT_PATH=${artifact_path}"
            echo "ARTIFACT_SIZE=${artifact_size}"
          } >> "${GITHUB_ENV}"

      - name: Publish job summary
        shell: bash
        run: |
          {
            echo "## Build summary"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Target: \`${{ matrix.target }}\`"
            echo "- pnpm install: \`${INSTALL_SECONDS}s\`"
            echo "- cargo build --release --locked: \`${BUILD_SECONDS}s\`"
            echo "- Total: \`${TOTAL_SECONDS}s\`"
            echo "- Binary: \`${ARTIFACT_PATH}\`"
            echo "- Size: \`${ARTIFACT_SIZE} bytes\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: kat-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
